<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreta Webmap</title>
    
    <!-- KORREKTUR: Vollständiger Leaflet CSS Link über unpkg CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body, #map {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #cccccc;
        }
    </style>
</head>
<body>

    <!-- Das Kartenelement -->
    <div id="map"></div>

    <!-- KORREKTUR: Vollständiger Leaflet JavaScript Link über unpkg CDN -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Karte initialisieren und auf Kreta zentrieren
        const map = L.map('map').setView([35.2401, 24.8093], 9);
        
        // KORREKTUR: Korrekte und funktionierende Esri-Karten-URL
        L.tileLayer('https://arcgisonline.com{z}/{y}/{x}.png', {
            maxZoom: 19,
            attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ'
        }).addTo(map);

        // Marker setzen (wird automatisch geöffnet)
        L.marker([35.2979, 25.1633]).addTo(map).bindPopup("<b>Hallo Kreta!</b><br>Es klappt.").openPopup();
    </script>
</body>
</html>
