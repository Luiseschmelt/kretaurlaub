<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreta Webmap</title>
    
    <!-- Leaflet CSS über unpkg CDN -->
    <link rel="stylesheet" href="https://unpkg.com" />
    
    <style>
        html, body, #map {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #cccccc;
        }
    </style>
</head>
<body>

    <!-- Das Kartenelement -->
    <div id="map"></div>

    <!-- Leaflet JavaScript über unpkg CDN -->
    <script src="https://unpkg.com"></script>

    <script>
        // Karte initialisieren und auf Kreta zentrieren
        var map = L.map('map').setView([35.2401, 24.8093], 9);
        
        // GANZ WICHTIG: Absolut fehlerfreie HTTPS-Adresse für OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>'
        }).addTo(map);

        // Marker setzen (wird automatisch geöffnet)
        L.marker([35.2979, 25.1633]).addTo(map).bindPopup("<b>Hallo Kreta!</b><br>Es klappt.").openPopup();
    </script>
</body>
</html>
